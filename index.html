
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>키워드 연관어 분석기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f2; --surface: #ffffff; --border: #e8e5de; --border-strong: #ccc8bf;
    --text: #1a1917; --text-muted: #6b6760; --text-hint: #aba89f;
    --accent: #2e2c28; --radius: 10px; --radius-pill: 99px;
    --blue-bg: #e8f0fb; --blue-text: #1a4a8a; --blue-border: #b3ccf5;
    --green-bg: #e6f4e6; --green-text: #1a5c2a; --green-border: #9dd49d;
    --purple-bg: #eeebfc; --purple-text: #3d2f9e; --purple-border: #c5baf5;
    --amber-bg: #fef3dc; --amber-text: #7a4e0a; --amber-border: #f5d48a;
    --red-bg: #fdecea; --red-text: #922; --red-border: #f5bcbc;
  }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: var(--accent); color: #fff; padding: 2rem 2rem 1.5rem; }
  header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
  header p { font-size: 0.82rem; opacity: 0.5; }

  .api-setup {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
  }
  .api-setup summary {
    cursor: pointer;
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
    list-style: none;
    user-select: none;
  }
  .api-setup summary::before { content: '🔑'; }
  .api-setup[open] summary::after { content: ' (접기)'; font-weight: 400; font-size: 0.78rem; }
  .api-setup:not([open]) summary::after { content: ' (API 키 설정 — 클릭해서 펼치기)'; font-weight: 400; font-size: 0.78rem; color: var(--text-hint); }

  .api-fields {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-top: 14px;
  }
  @media (max-width: 640px) { .api-fields { grid-template-columns: 1fr; } }

  .api-field label { display: block; font-size: 0.72rem; font-weight: 700; color: var(--text-hint); margin-bottom: 5px; letter-spacing: 0.05em; text-transform: uppercase; }
  .api-field input { width: 100%; padding: 0.55rem 0.85rem; font-size: 0.82rem; font-family: monospace; border: 1.5px solid var(--border-strong); border-radius: var(--radius); background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
  .api-field input:focus { border-color: var(--accent); }

  .api-actions { display: flex; gap: 8px; margin-top: 12px; align-items: center; }
  .btn-save { padding: 0.55rem 1.2rem; font-size: 0.82rem; font-family: inherit; font-weight: 700; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; transition: opacity 0.15s; }
  .btn-save:hover { opacity: 0.8; }
  .btn-clear { padding: 0.55rem 1rem; font-size: 0.82rem; font-family: inherit; background: transparent; color: var(--text-muted); border: 1px solid var(--border-strong); border-radius: var(--radius); cursor: pointer; }
  .api-status { font-size: 0.78rem; }
  .status-ok { color: var(--green-text); }
  .status-no { color: var(--text-hint); }

  .api-notice {
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--amber-bg);
    border: 1px solid var(--amber-border);
    border-radius: var(--radius);
    font-size: 0.78rem;
    color: var(--amber-text);
    line-height: 1.6;
  }

  .search-wrap {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .search-wrap input { flex: 1; padding: 0.65rem 1rem; font-size: 1rem; font-family: inherit; border: 1.5px solid var(--border-strong); border-radius: var(--radius); background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text-hint); }
  .search-wrap button { padding: 0.65rem 1.4rem; font-size: 0.9rem; font-family: inherit; font-weight: 700; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
  .search-wrap button:hover { opacity: 0.85; }
  .search-wrap button:active { transform: scale(0.97); }

  .examples { padding: 0.7rem 2rem; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface); }
  .examples span { font-size: 0.75rem; color: var(--text-hint); }
  .ex-chip { font-size: 0.78rem; padding: 4px 12px; border-radius: var(--radius-pill); border: 1px solid var(--border-strong); background: transparent; color: var(--text-muted); cursor: pointer; font-family: inherit; transition: background 0.12s, color 0.12s; }
  .ex-chip:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  main { padding: 2rem; max-width: 960px; }

  .empty-state { text-align: center; padding: 5rem 2rem; color: var(--text-hint); }
  .empty-state .ico { font-size: 2.5rem; margin-bottom: 1rem; display: block; opacity: 0.4; }
  .empty-state p { font-size: 0.9rem; }

  .loading-msg { padding: 3rem 0; color: var(--text-muted); font-size: 0.9rem; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border-strong); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .source-badge { display: inline-block; font-size: 0.7rem; padding: 2px 8px; border-radius: var(--radius-pill); font-weight: 700; margin-left: 8px; vertical-align: middle; }
  .badge-naver { background: #03C75A22; color: #028a3d; border: 1px solid #03C75A55; }
  .badge-estimate { background: var(--amber-bg); color: var(--amber-text); border: 1px solid var(--amber-border); }

  .intent-banner { background: var(--accent); color: #fff; border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1.5rem; font-size: 0.88rem; line-height: 1.6; }
  .intent-banner strong { font-weight: 700; }
  .intent-banner .sub { opacity: 0.6; font-size: 0.8rem; margin-top: 2px; }

  .section-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-hint); margin-bottom: 10px; }

  .chips-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 2rem; }
  .chip { padding: 6px 14px; border-radius: var(--radius-pill); font-size: 0.82rem; font-family: inherit; cursor: pointer; border: 1px solid; transition: transform 0.1s, opacity 0.1s; }
  .chip:hover { transform: translateY(-1px); opacity: 0.85; }
  .chip.autocomplete { background: var(--amber-bg); color: var(--amber-text); border-color: var(--amber-border); }
  .chip.related { background: var(--purple-bg); color: var(--purple-text); border-color: var(--purple-border); }

  .kw-table { width: 100%; border-collapse: collapse; margin-bottom: 2rem; font-size: 0.85rem; }
  .kw-table th { text-align: left; padding: 8px 12px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-hint); border-bottom: 1px solid var(--border); }
  .kw-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
  .kw-table tr:last-child td { border-bottom: none; }
  .kw-table tr:hover td { background: var(--bg); }
  .kw-table .kw-name { font-weight: 500; cursor: pointer; color: var(--accent); }
  .kw-table .kw-name:hover { text-decoration: underline; }
  .vol-bar { height: 6px; background: var(--border); border-radius: 99px; margin-top: 4px; overflow: hidden; }
  .vol-fill { height: 100%; background: #03C75A; border-radius: 99px; transition: width 0.4s; }

  .journey-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 2rem; }
  @media (max-width: 600px) { .journey-grid { grid-template-columns: 1fr; } main { padding: 1.25rem; } }

  .journey-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.1rem 1.25rem; }
  .journey-card-title { font-size: 0.78rem; font-weight: 700; color: var(--text-muted); margin-bottom: 12px; }
  .badge { display: inline-block; font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: var(--radius-pill); letter-spacing: 0.04em; margin-bottom: 10px; }
  .badge-before { background: var(--blue-bg); color: var(--blue-text); }
  .badge-after { background: var(--green-bg); color: var(--green-text); }
  .journey-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
  .journey-item:last-of-type { border-bottom: none; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-blue { background: #378ADD; }
  .dot-green { background: #3B9A3B; }
  .note { margin-top: 12px; font-size: 0.78rem; color: var(--text-muted); line-height: 1.7; padding-top: 12px; border-top: 1px dashed var(--border); }

  .tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 2rem; }
  .tool-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.1rem; text-decoration: none; color: var(--text); display: block; transition: border-color 0.15s, transform 0.1s; }
  .tool-card:hover { border-color: var(--border-strong); transform: translateY(-2px); }
  .tool-card .tool-name { font-size: 0.88rem; font-weight: 700; margin-bottom: 4px; }
  .tool-card .tool-desc { font-size: 0.75rem; color: var(--text-muted); line-height: 1.5; }
  .tool-card .tool-tag { display: inline-block; font-size: 0.68rem; padding: 2px 7px; border-radius: var(--radius-pill); margin-top: 8px; background: var(--bg); color: var(--text-hint); border: 1px solid var(--border); }

  .error-box { background: var(--red-bg); border: 1px solid var(--red-border); border-radius: var(--radius); padding: 1rem 1.25rem; font-size: 0.85rem; color: var(--red-text); margin-bottom: 1.5rem; line-height: 1.6; }
</style>
</head>
<body>

<header>
  <h1>🔍 키워드 연관어 분석기</h1>
  <p>네이버 검색광고 API 기반 실데이터 · 키워드 검색량 + 연관어 분석</p>
</header>

<!-- API 키 설정 -->
<details class="api-setup" id="apiSetup">
  <summary>API 키 설정</summary>
  <div class="api-fields">
    <div class="api-field">
      <label>Customer ID</label>
      <input type="password" id="customerId" placeholder="숫자로 된 고객 ID" />
    </div>
    <div class="api-field">
      <label>액세스라이선스</label>
      <input type="password" id="accessLicense" placeholder="액세스라이선스 키" />
    </div>
    <div class="api-field">
      <label>비밀키</label>
      <input type="password" id="secretKey" placeholder="비밀키" />
    </div>
  </div>
  <div class="api-actions">
    <button class="btn-save" onclick="saveKeys()">저장하기</button>
    <button class="btn-clear" onclick="clearKeys()">초기화</button>
    <span class="api-status" id="apiStatus"></span>
  </div>
  <div class="api-notice">
    🔒 입력한 키는 이 브라우저에만 저장되며 외부로 전송되지 않습니다.<br>
    ⚠️ 네이버 검색광고 API는 <strong>서버에서만 호출 가능</strong>하기 때문에, 브라우저에서 직접 호출 시 CORS 오류가 발생할 수 있습니다.<br>
    그럴 경우 아래 <strong>"API 없이 분석하기"</strong> 버튼을 이용하거나, 별도 서버 연동이 필요합니다.
  </div>
</details>

<div class="search-wrap">
  <input type="text" id="kwInput" placeholder="키워드를 입력하세요 (예: 1인 리클라이너)" />
  <button onclick="analyze()">분석하기</button>
</div>

<div class="examples">
  <span>예시 →</span>
  <button class="ex-chip" onclick="quickSearch('1인 리클라이너')">1인 리클라이너</button>
  <button class="ex-chip" onclick="quickSearch('노트북 추천')">노트북 추천</button>
  <button class="ex-chip" onclick="quickSearch('러닝화')">러닝화</button>
  <button class="ex-chip" onclick="quickSearch('원룸 인테리어')">원룸 인테리어</button>
  <button class="ex-chip" onclick="quickSearch('다이어트 식단')">다이어트 식단</button>
</div>

<main id="main">
  <div class="empty-state">
    <span class="ico">🔍</span>
    <p>키워드를 입력하고 분석하기를 눌러보세요</p>
  </div>
</main>

<script>
// ───── 로컬 저장 ─────
function saveKeys() {
  const cid = document.getElementById('customerId').value.trim();
  const lic = document.getElementById('accessLicense').value.trim();
  const sec = document.getElementById('secretKey').value.trim();
  if (!cid || !lic || !sec) { setStatus('❌ 3개 모두 입력해주세요', false); return; }
  localStorage.setItem('nsa_cid', cid);
  localStorage.setItem('nsa_lic', lic);
  localStorage.setItem('nsa_sec', sec);
  setStatus('✅ 저장 완료', true);
  document.getElementById('apiSetup').removeAttribute('open');
}

function clearKeys() {
  localStorage.removeItem('nsa_cid');
  localStorage.removeItem('nsa_lic');
  localStorage.removeItem('nsa_sec');
  document.getElementById('customerId').value = '';
  document.getElementById('accessLicense').value = '';
  document.getElementById('secretKey').value = '';
  setStatus('🗑 초기화 완료', false);
}

function setStatus(msg, ok) {
  const el = document.getElementById('apiStatus');
  el.textContent = msg;
  el.className = 'api-status ' + (ok ? 'status-ok' : 'status-no');
}

function loadKeys() {
  const cid = localStorage.getItem('nsa_cid');
  const lic = localStorage.getItem('nsa_lic');
  const sec = localStorage.getItem('nsa_sec');
  if (cid) document.getElementById('customerId').value = cid;
  if (lic) document.getElementById('accessLicense').value = lic;
  if (sec) document.getElementById('secretKey').value = sec;
  if (cid && lic && sec) setStatus('✅ 저장된 키 불러옴', true);
  return { cid, lic, sec };
}

// ───── 검색량 포맷 ─────
function fmtVol(n) {
  if (n === null || n === undefined) return '-';
  if (n >= 10000) return Math.round(n/1000)*1000 + '+';
  if (n >= 1000) return Math.round(n/100)*100 + '+';
  return n.toString();
}

// ───── 네이버 API 호출 (CORS 이슈 있을 수 있음) ─────
async function fetchNaverKeywords(keyword, keys) {
  const timestamp = Date.now().toString();
  const method = 'GET';
  const path = '/keywordstool';

  // HMAC-SHA256 서명 (브라우저 SubtleCrypto)
  const message = `${timestamp}.${method}.${path}`;
  const encoder = new TextEncoder();
  const keyData = encoder.encode(keys.sec);
  const msgData = encoder.encode(message);
  const cryptoKey = await crypto.subtle.importKey('raw', keyData, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', cryptoKey, msgData);
  const signature = btoa(String.fromCharCode(...new Uint8Array(sig)));

  const url = `https://api.naver.com/keywordstool?hintKeywords=${encodeURIComponent(keyword)}&showDetail=1`;

  const res = await fetch(url, {
    headers: {
      'X-Timestamp': timestamp,
      'X-API-KEY': keys.lic,
      'X-Customer': keys.cid,
      'X-Signature': signature,
    }
  });

  if (!res.ok) throw new Error(`API 오류: ${res.status}`);
  const data = await res.json();
  return data.keywordList || [];
}

// ───── 로컬 폴백 데이터 ─────
const LOCAL_DB = {

      { keyword: "안락의자", monthlyPcQcCnt: 1500, monthlyMobileQcCnt: 5500 },
      { keyword: "1인용 소파", monthlyPcQcCnt: 900, monthlyMobileQcCnt: 3800 },
      { keyword: "1인 리클라이너 가죽", monthlyPcQcCnt: 600, monthlyMobileQcCnt: 2400 },
      { keyword: "리클라이너 의자", monthlyPcQcCnt: 1800, monthlyMobileQcCnt: 6200 },
      { keyword: "1인 리클라이너 패브릭", monthlyPcQcCnt: 400, monthlyMobileQcCnt: 1800 },
      { keyword: "홈시네마 의자", monthlyPcQcCnt: 700, monthlyMobileQcCnt: 2900 },
      { keyword: "1인용 소파베드", monthlyPcQcCnt: 1100, monthlyMobileQcCnt: 4200 },
    ],
    before: ["소파 추천", "1인용 가구", "거실 소파 종류", "홈인테리어", "안락의자 추천", "소파 브랜드", "거실 꾸미기", "1인 가구 필수템", "가구 쇼핑몰", "소파 소재 비교"],
    after: ["리클라이너 커버", "소파 청소 방법", "가구 배송", "방수 커버", "소파 관리법", "리클라이너 부품", "가죽 소파 세정제", "소파 조립 방법", "가구 AS 후기", "소파 발판 교체"],
    intent: "구매 전 비교 탐색 단계", sub: "가격·소재·브랜드를 비교하는 중"
  },
  "노트북 추천": {
    keywords: [
      { keyword: "노트북 추천 2024", monthlyPcQcCnt: 3200, monthlyMobileQcCnt: 9800 },
      { keyword: "게이밍 노트북 추천", monthlyPcQcCnt: 2800, monthlyMobileQcCnt: 7200 },
      { keyword: "대학생 노트북", monthlyPcQcCnt: 1900, monthlyMobileQcCnt: 6100 },
      { keyword: "LG 그램", monthlyPcQcCnt: 4100, monthlyMobileQcCnt: 11200 },
      { keyword: "맥북 추천", monthlyPcQcCnt: 3500, monthlyMobileQcCnt: 9500 },

      { keyword: "노트북 100만원대 추천", monthlyPcQcCnt: 1400, monthlyMobileQcCnt: 5200 },
      { keyword: "영상편집 노트북", monthlyPcQcCnt: 1100, monthlyMobileQcCnt: 4300 },
      { keyword: "윈도우 노트북 추천", monthlyPcQcCnt: 900, monthlyMobileQcCnt: 3700 },
      { keyword: "노트북 사양 비교", monthlyPcQcCnt: 800, monthlyMobileQcCnt: 2900 },
    ],

    after: ["노트북 파우치", "노트북 거치대", "노트북 초기설정", "노트북 파우치 추천", "블루투스 마우스", "노트북 쿨러", "노트북 AS 센터", "SSD 업그레이드", "노트북 키스킨", "외장 모니터 추천"],
    intent: "구매 결정 전 정보 수집 단계", sub: "용도와 예산을 좁히는 과정"
  },
};

function getLocalData(kw) {
  if (LOCAL_DB[kw]) return LOCAL_DB[kw];
  return {
    keywords: [
      { keyword: kw + " 추천", monthlyPcQcCnt: null, monthlyMobileQcCnt: null },
      { keyword: kw + " 가격", monthlyPcQcCnt: null, monthlyMobileQcCnt: null },
      { keyword: kw + " 비교", monthlyPcQcCnt: null, monthlyMobileQcCnt: null },
    ],
    before: [kw + " 종류", kw + " 정보", "관련 카테고리 탐색"],
    after: [kw + " 사용법", kw + " 관리", kw + " 액세서리"],
    intent: `"${kw}" 검색자 의도 추정`, sub: "의미 기반 추론 — API 키 설정 시 실데이터로 대체됩니다"
  };
}

// ───── 분석 실행 ─────
async function analyze() {
  const kw = document.getElementById('kwInput').value.trim();
  if (!kw) return;

  const main = document.getElementById('main');
  main.innerHTML = `<div class="loading-msg"><span class="spinner"></span> 분석 중...</div>`;

  const keys = loadKeys();
  let keywords = [];
  let isReal = false;
  let errorMsg = '';

  if (keys.cid && keys.lic && keys.sec) {
    try {
      keywords = await fetchNaverKeywords(kw, keys);
      isReal = true;
    } catch (e) {
      errorMsg = e.message.includes('Failed to fetch') || e.message.includes('CORS')
        ? 'CORS 오류: 네이버 API는 브라우저에서 직접 호출이 제한됩니다. 아래 추정 데이터로 대신 표시합니다.'
        : `API 오류: ${e.message}. 추정 데이터로 대신 표시합니다.`;
    }
  }

  const local = getLocalData(kw);
  if (!isReal) keywords = local.keywords;

  render(kw, keywords, local, isReal, errorMsg);
}

function render(kw, keywords, local, isReal, errorMsg) {
  const main = document.getElementById('main');
  const maxVol = Math.max(...keywords.map(k => (k.monthlyPcQcCnt || 0) + (k.monthlyMobileQcCnt || 0)), 1);

  const sortedKeywords = [...keywords].sort((a, b) => {
    const totalA = (a.monthlyPcQcCnt || 0) + (a.monthlyMobileQcCnt || 0);
    const totalB = (b.monthlyPcQcCnt || 0) + (b.monthlyMobileQcCnt || 0);
    return totalB - totalA;
  });

  const tableRows = sortedKeywords.map((k, i) => {
    const total = (k.monthlyPcQcCnt || 0) + (k.monthlyMobileQcCnt || 0);
    return `
      <tr>
        <td style="color:var(--text-hint);font-size:0.78rem;width:28px">${i + 1}</td>
        <td class="kw-name" onclick="quickSearch('${k.keyword.replace(/'/g,"\\'")}')">🔍 ${k.keyword}</td>
        <td>${k.monthlyPcQcCnt !== null ? fmtVol(k.monthlyPcQcCnt) : '-'}</td>
        <td>${k.monthlyMobileQcCnt !== null ? fmtVol(k.monthlyMobileQcCnt) : '-'}</td>
        <td><strong style="color:var(--accent)">${total > 0 ? fmtVol(total) : '-'}</strong></td>
      </tr>`;
  }).join('');

  main.innerHTML = `
    ${errorMsg ? `<div class="error-box">⚠️ ${errorMsg}</div>` : ''}

    <div class="intent-banner">
      <strong>${local.intent}</strong> — "${kw}"
      <div class="sub">${local.sub}</div>
    </div>

    <div class="section-label" style="margin-bottom:10px">
      연관 키워드 + 월간 검색량
      <span class="source-badge ${isReal ? 'badge-naver' : 'badge-estimate'}">${isReal ? '네이버 실데이터' : '추정치'}</span>
    </div>
    <div style="overflow-x:auto; margin-bottom:2rem; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);">
      <table class="kw-table">
        <thead><tr><th>#</th><th>키워드</th><th>PC 검색량</th><th>모바일 검색량</th><th>총 검색량 ↓</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>

    <div class="journey-grid">
      <div class="journey-card">
        <div class="journey-card-title">← 검색 이전 예상 키워드</div>
        <div class="badge badge-before">BEFORE</div>
        ${local.before.map(w => `<div class="journey-item"><span class="dot dot-blue"></span>${w}</div>`).join('')}
        <p class="note">
          <strong style="color:var(--text-muted)">추론 근거</strong><br>
          사람들은 보통 <em>넓은 범주 → 좁은 범주</em> 순서로 탐색합니다. 구체적인 제품명을 검색하기 전, 상위 카테고리나 "추천" 키워드로 먼저 시장을 파악하는 패턴에서 도출했습니다.<br><br>
          <span style="color:var(--text-hint)">※ 실제 세션 데이터가 아닌 의미 기반 추론입니다. 실데이터는 GA4·네이버 광고 보고서에서 확인 가능합니다.</span>
        </p>
      </div>
      <div class="journey-card">
        <div class="journey-card-title">→ 검색 이후 예상 키워드</div>
        <div class="badge badge-after">AFTER</div>
        ${local.after.map(w => `<div class="journey-item"><span class="dot dot-green"></span>${w}</div>`).join('')}
        <p class="note">
          <strong style="color:var(--text-muted)">추론 근거</strong><br>
          구매 결정 후에는 <em>관리·부속품·사용법</em>으로 관심이 이동하는 패턴에서 도출했습니다. 쇼핑 후기, 커뮤니티 Q&A에서 반복적으로 등장하는 구매 후 고민들을 카테고리화했습니다.<br><br>
          <span style="color:var(--text-hint)">※ 실제 세션 데이터가 아닌 카테고리·의미 기반 추론입니다.</span>
        </p>
      </div>
    </div>

    <div class="section-label" style="margin-bottom:12px">함께 활용하면 좋은 도구</div>
    <div class="tools-grid">
      <a class="tool-card" href="https://datalab.naver.com" target="_blank">
        <div class="tool-name">네이버 데이터랩</div>
        <div class="tool-desc">트렌드, 쇼핑 인사이트, 연령/성별 분포</div>
        <span class="tool-tag">무료</span>
      </a>
      <a class="tool-card" href="https://searchad.naver.com" target="_blank">
        <div class="tool-name">네이버 검색광고</div>
        <div class="tool-desc">키워드 도구 — 월간 검색량 직접 조회</div>
        <span class="tool-tag">무료 (계정 필요)</span>
      </a>
      <a class="tool-card" href="https://trends.google.com/trends/?geo=KR" target="_blank">
        <div class="tool-name">Google Trends</div>
        <div class="tool-desc">관련 검색어, 지역·시기별 트렌드</div>
        <span class="tool-tag">무료</span>
      </a>
    </div>
  `;
}

function quickSearch(kw) {
  document.getElementById('kwInput').value = kw;
  analyze();
}

document.getElementById('kwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') analyze();
});

// 페이지 로드 시 저장된 키 불러오기
window.addEventListener('load', loadKeys);
</script>
</body>
</html>
